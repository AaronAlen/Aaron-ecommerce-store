<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./index.css">
    <style>
        *{
            margin: 0%;
            padding: 0%;
            background-color: transparent;
        }
        #inside{
            height: auto; display: flex; 
            justify-content: center; 
            align-items: center; 
            padding: 5%;
        }
         #product, #subProduct, #cartTitle, #subCartTitle ,#checkoutDiv{
            width: 90%;
            display: flex;
            justify-content: space-around;
            align-items: center;
        }
        #product {
            margin-bottom: 10% !important;
        }

         #headingPrice{
            width: 40%;
        }
        #imgP{
            /* background-color: black; */
            width: 300px;
            height: 300px;
            border-radius:20px;
            box-shadow: 0px 0px 10px rgb(201, 200, 200);
        }
        #product button{
            margin-bottom: 1%; 
            padding: 1%;
            background-color: red;
        }
        #homeProductDiv{
            width: 80%;
            height: auto;
            display: flex;
            flex-direction: column;
            /* justify-content: space-around; */
            align-items: center;
            border-radius: 50px;
            background-color: white;
            width: 90%; height:auto;
            box-shadow: 0px 0px 25px gray;
            gap: 50px;
        }
        #productDiv{
            width: 90%;
            height: auto;
        }
        #total{
            display: flex;
            flex-direction: column;     
            align-items: center;   
            background-color: transparent;
        }
        #total p{
            background-color: transparent;
        }
        /* span{
            text-decoration: ;
        } */

        /* #btn1{
            background-color: green;
        } */
         #btn{
            height: 60%;
            width: 50%;
         }
         .dlt1{
            margin-top: 10%;
         }

        .hoverClass{
          transition: 0.2s ease;
        }
        .hoverClass:hover{
          transform: scale(1.05);
          box-shadow: 5px 5px 50px rgb(172, 172, 172);   
        }

        .hoverClassb{
          transition: 0.2s ease;
        }
        .hoverClassb:hover{
          transform: scale(1.3);
        }

    
    @media (max-width:420px){
        #inside{
            width: 100% !important;
            padding: 0% !important;
            height: auto !important;
        }
        #homeProductDiv{
            margin-top: 5%;
            width: 95%;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        #product{
            /* position: relative; */
            /* height: 100px; */
            padding-bottom: 10% !important;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: relative;
            margin-bottom: 30% !important;
            /* gap: 50px; */
            /* justify-content: center; */
        }
        #imgP{
            width: 50%;
            height: auto;
        }        

     
        #btn{
            font-size: 18px;
            width: 35%;
            height: 24%;
            position: absolute;
            left: 35%;
            top: 80%;
        }
        .dlt{
            font-size: 18px !important;
            width: 35% !important;
            height: 24% !important;
            position: absolute !important;
            left: 60% !important;
            top: 95% !important;
        }
        



        h4{
            font-size: 13px !important;
        }


    }

    </style>
</head>
<body style="overflow-x: hidden;">
                            <div id="inside">
                
                    <div id="homeProductDiv">
                        <div id="cartTitle" style="height: 20%; margin-top: 5%; justify-content: center;"><div id="subCartTitle" style="width: 15%;"><b>${localStorage.getItem("status")}</b><img src="${imageScr}" width="30px" alt=""></div></div>

                        <div id="productDiv">                   

                        </div>  

                        <div id="total" style=" width: 90%; height: auto;">

                    </div>
                </div>
                
                
            </div>

</body>
<script>
    let change = ""
    let imageScr
    if(localStorage.getItem("status") == "Ordered") {change = "Shipped"; imageScr = "./images/checklist.png"}
    if(localStorage.getItem("status") == "Shipped") {change = "Out for Delivery"; imageScr = "./images/cruise.png"}
    if(localStorage.getItem("status") == "Out for Delivery") {change = "Delivered"; imageScr = "./images/delivery-bike.png"}

    imageScr = "./images/delivered.png"

    let subCartTitle = document.getElementById("subCartTitle")
    subCartTitle.innerHTML = `<b>${localStorage.getItem("status")}</b><img src="${imageScr}" width="30px" alt="">`

    // if(localStorage.getItem("status") == "delivered") change = "Shipped"

    // const div = document.getElementById("productDiv")

    console.log(localStorage.getItem("howManyOrders"));
    let id = localStorage.getItem("howManyOrders")
    let status = localStorage.getItem("status")
    

    
    let response;
    
    
    async function oders(){
            if(!localStorage.getItem("token")) return alert("login to view orders")
            const res = await fetch(`/product/viewOrders/${id}/${status}`,{
            // const res = await fetch(`http://${window.location.hostname}:3000/product/goToOrders`,{
                method : "GET",
                headers : {
                    "Content-Type" : "application/json",
                    "Authorization" : `Bearer ${localStorage.getItem ("token")}`
                }
            })
             response = await res.json()
            console.log(response);
            // data.forEach((product,index)=>product.count = count[index])
        
            display(response.data)
        }


        oders()



    let productDiv = document.getElementById("productDiv")

        function display(products){
            products.forEach((product, index) => {
                    productDiv.innerHTML += `
                            <div id="product" style="display: flex; margin-bottom: 2%;">
                                <img id="imgP" class="hoverClass" src=${product.image} width="300px" alt="">
                                <div id="headingPrice" "width: 150px">
                                    <h3 >product quantity : ${product.count}</h3>
                                    <h3 >address : </h3>
                                    <h4 >name : ${product.name}</h4>
                                    <h4 >phone : ${product.address.phone}</h4>
                                    <h4 >building : ${product.address.building}</h4>
                                    <h4 >area : ${product.address.area}</h4>
                                    <h4 >city : ${product.address.city}</h4>
                                    <h4 >state : ${product.address.state}</h4>
                                    <h4 >pincode : ${product.address.pincode}</h4>
                                    <button id="btn"  class="dlt1 hoverClass"  style="background-color: green;" >${product.status}</button>                

                                </div>
                            </div>                    

                    `
                    // console.log(product.id,product.email,index);
            })
        }

        async function statusChanger(id,email,index){

            let res = await fetch(`/product/statusChange/${id}/${email}/${change}`,{
                method : "post",
                headers : {
                    "content-type" : "application/json",
                    "authorization" : `bearer ${localStorage.getItem("token")}`
                }
            })
            if(res.ok){
                response.data[index].status = change
                productDiv.innerHTML = ""
                display(response.data)
                alert(`Order moved to ${change}`)

            }
        }



</script>
</html>
