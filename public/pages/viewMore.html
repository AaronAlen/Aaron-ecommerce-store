<!-- <link rel="stylesheet" href="../style/index.css"> -->
 <style>
        *{
            background-color: white;
            /* margin: 0%;
            padding: 0%; */
        }
        #filterImg, #deleteImg{
          position: fixed;
        }

        #home{
          display: flex;
          flex-direction: column;
          justify-content: space-around;
          align-items: space-between;
        }

        #filter{
          display: none; 
          z-index: 2; 
          position: fixed; 
          /* top: -200px; */
          overflow-y: auto;
          height: 73vh;
          width: 16%;
          margin-left: 3%;
          border-radius: 10px;
          box-shadow: 0px 0px 10px rgb(172, 172, 172);
          padding: 2%;
        }

        #title{
          background-color: white;
          color: black;
          text-align: center;
        }
        #div{
          display: grid;
          grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
          margin-left: 7%;
        }

        .card{
            width: 250px;
            /* height: 350px; */
            background-color: white;
            margin: 10%;
            text-align: center;
            border-radius: 10px;
            box-shadow: 5px 5px 10px rgb(172, 172, 172);

        }
        .card img{
            /* width: 200px; */
            height: 150px; 
            margin: 10%;
            border-radius: 10px;
            margin-bottom: 0%;
            /* box-shadow: 5px 5px 10px rgb(172, 172, 172); */

        }
        .card h2,p,h1{
            background-color: white;
        }

        #btn{
          background-color: orange;
          width: 50%;
          border-radius:10px;
          border: none;
          margin-bottom: 10%;
          color: white;
          box-shadow: 5px 5px 10px rgb(172, 172, 172);
          /* width:auto; */
          padding: 1%;
          font-size: 18px;
        }
        
        #ankr{
          background-color: orange;
          color: white;
          text-decoration: none;
        }

        .card p,.card h2{
          padding-left: 2%;
          padding-right: 2%;
        }

        .hoverClass{
          transition: 0.2s ease;
        }
        .hoverClass:hover{
          transform: scale(1.05);
          box-shadow: 5px 5px 50px rgb(172, 172, 172);   
        }

        .hoverClassb{
          transition: 0.2s ease;
        }
        .hoverClassb:hover{
          transform: scale(1.3);
        }        

        @media (max-width:420px){
        #btnO{
          top: 1% !important;
          left: 70% !important;
        }
        #btnc{
          top: 1% !important;
          left: 80% !important;
        }
        #btnl{
          top: 1% !important;
          left: 90% !important;
        }}

</style>

</head>

    <img src="../images/trolley.png"  width="30px" id="btnc" onclick="goToCart()" class="hoverClassb" style="background-color: transparent; position: fixed; left: 80%;"></img>
    <img src="../images/user (2).png"  width="30px" id="btnl" onclick="login()" class="hoverClassb" style="background-color: transparent; position: fixed; left: 85%; z-index: 3;"></img>

<script >


    async function login(){
    window.location.href = "login.html"

          let div = document.getElementById("div");
          let home = document.getElementById("home");

      async function fetchdata() {
        let category = localStorage.getItem("category")
        console.log(category);
        category = category.split(",")
        console.log(typeof(category),category);
        console.log(category);
        let data = await fetch(`/product/findSome`,{
        // let data = await fetch(`http://${window.location.hostname}:3000/product/findSome`,{
          method : "post",
          headers : {
            "content-type" : "application/json"
          },
          body : JSON.stringify({category})
        })
        let products = await data.json()
        display(products.data,2)
      }

      function display(products,reload){
        
        let newarr = []
        for(value of products){
            let newdata = {id:value.id,
                title:value.title,
                description:value.description,
                catogery:value.category,
                price:value.price,
                images:value.images
            }
            newarr.push(newdata)
        }

        let newarr1 = {}

        for(v of newarr){
            if(newarr1[v.catogery] == undefined) newarr1[v.catogery] = [v]
            else newarr1[v.catogery].push(v)

        }

        home.innerHTML = ""

        let filter = document.getElementById("filter")

          for([i,v] of Object.entries(newarr1)){
            let catogerydiv = document.createElement("div")
            catogerydiv.id = "div"
            let catogerytitle = document.createElement("h1")
            catogerytitle.id = "title"
            catogerytitle.className = "hoverClassb"
            catogerytitle.style.backgroundColor = "transparent"
            catogerytitle.innerHTML = `${i}`
            // if(loadingTurn == 1)filter.innerHTML +=`<input type="radio" name="category" value="${i}" style="color: white;">${i}</br>`

          for(d of v){
            let img = d.images[0]
            catogerydiv.innerHTML += `
            <div class="card hoverClass" >
                <img src="${img}" alt="">
                <h2>${d.title}</h2>
                <p>${d.description}</p>
             <h1>${d.price}</h1>
            <button id="btn" class="hoverClass" onclick = "send(${d.id})">buy now</button>
            </div>`
        //    if(reload == 1)home.append(catogerydiv)
        }
        if(reload==2){
          // let reloadDiv = document.createElement("div")
          home.append(catogerytitle);
          home.append(catogerydiv)
          // home.append(reloadDiv)
          // let reloadDiv = document.createElement("div")
          // reloadDiv.append(catogerytitle);
          // reloadDiv.append(catogerydiv)
          // home.append(reloadDiv)
      }
      }
    //   if(loadingTurn == 1)filter.innerHTML+=`<div style = "text-align : center;"><button id="btn" style = "margin-top : 15%;"onclick="submt(null)">Filter</button></div>`
    //   loadingTurn = 2
        

      }
      fetchdata();

        localStorage.setItem('id',id)      
        window.location.href = "nextpage.html"
