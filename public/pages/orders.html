<script>
    
    const div = document.getElementById("productDiv")
    
    let response;
    
    
    async function oders(){
            if(!localStorage.getItem("token")) return alert("login to view orders")
            const res = await fetch(`/product/goToOrders`,{
                method : "GET",
                headers : {
                    "Content-Type" : "application/json",
                    "Authorization" : `Bearer ${localStorage.getItem ("token")}`
                }
            })
             response = await res.json()
            console.log(response);
            // data.forEach((product,index)=>product.count = count[index])
        
            display(response)
        }


        oders().then(()=>console.log(response))




        function dlt(index){
            data.splice(index,1)
            div.innerHTML =""
            display(data)
        }

        function display(products){
            products.forEach((product, index) => {
                div.innerHTML += `
                <div id="product" style="display: flex;">
                    <img id="imgP" src=${product.img} width="100px" alt="">
                    <div id="headingPrice" "width: 150px">
                        <h4 >${product.title}</h4>
                    </div>
                    <button id="btn" class="dlt1" onclick = "dlt(${index})" style="background-color: green;" >${product.status}</button>                
                    <button id="btn" class="dlt" onclick = "dlt(${index})" style="width: 13%;">cancel</button>                
                </div>`
            })

        }
