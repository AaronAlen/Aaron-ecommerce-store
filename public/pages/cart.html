<body style="overflow-x: hidden;">
    <div id="inside" style="height: auto; display: flex; justify-content: center; align-items: center; padding: 5%;">
        
            <div id="homeProductDiv">
                <div id="cartTitle" style="height: 20%; margin-top: 5%; justify-content: center;"><div id="subCartTitle" style="width: 15%;"><b>Cart</b><img src="../images/trolley.png" width="30px" alt=""></div></div>

                <div id="productDiv">
                </div>  

                <div id="total" style=" width: 90%; height: auto;">

            </div>
        </div>
        
        
    </div>
</body>
<script>
    
    const div = document.getElementById("productDiv")
    const total = document.getElementById("total")
    
    let data;
    
    
    async function goToCart(){
            if(!localStorage.getItem("token")) return alert("no token")
            const res = await fetch(`http://${window.location.hostname}:3000/product/goToCart`,{
                method : "GET",
                headers : {
                    "Content-Type" : "application/json",
                    "Authorization" : `Bearer ${localStorage.getItem ("token")}`
                }
            })
            const response = await res.json()
            data = await response.data
            let count = await response.count
            data.forEach((product,index)=>product.count = count[index])
        
            display(data)
        }


        goToCart().then(()=>console.log(data))


        function checkout(){
            window.location.href = "address.html"
        }

        function dlt(index){
            data.splice(index,1)
            div.innerHTML =""
            display(data)
        }

        function display(products){
            let totalPrice = 0
            products.forEach((product, index) => {
                div.innerHTML += `
                <div id="product" style="display: flex;">
                    <img id="imgP" src=${product.images[0]} width="100px" alt="">
                    <div id="headingPrice" "width: 150px">
                        <h6 >${product.title}</h6>
                        <h3 >${product.price}</h3>
                    </div>
                    <div id="subProduct">
                        <img src="../images/add.png" onclick ="add(${index})" width="20px"  height="20px"  alt=""style="padding-left:10px">
                        <h3 class="add" style="padding-left:10px">${product.count}</h3>
                        <img class="add" src="../images/remove.png" onclick ="sub(${index})" width="20px"  height="20px" alt="" style="padding-left:10px"> 
                        <h3 id="totalPrice" style="padding-left:20px">${(product.price*product.count).toFixed(2)}</h3>                   
                    </div>
                    <button id="btn" class="dlt" onclick = "dlt(${index})" >delete</button>                
                </div>`
                totalPrice += product.price * product.count
            })

            total.innerHTML = `
                <div id="totalCost" style="width: 100%; padding-left: 30%; background-color: transparent;">
                    <p>Subtotal : <b>${totalPrice.toFixed(2)}</b></p>
                    <p>your order eligible for free delivery</p>
                </div>
                <div id="checkoutDiv" style="height:auto; margin: 2%; display: flex; justify-content: center; align-items: center; gap: 20%;">
                    <button id="btn" onclick="save()" style="margin-bottom: 5%; margin-top: 5%; background-color: green; width: 20%;">save</button>
                    <button id="btn" onclick="checkout()" style="margin-bottom: 5%; margin-top: 5%; width: 20%;">checkout</button>
                </div>

            `
        }

        function add(index){
            data[index].count +=1 
            console.log(data[index].count);

            div.innerHTML = ""
            display(data)
            
        }
        function sub(index){
            if(data[index].count >= 1)data[index].count -=1 
            console.log(data[index].count);

            div.innerHTML = ""
            display(data)
        }

        async function save(){
            let details = data.map(product => {return {productId : product._id, count : product.count}})
            console.log(details);
            const res = await fetch(`http://${window.location.hostname}:3000/product/saveProducts`,{
                method : "post",
                headers : {
                    "content-type" : "application/json",
                    "Authorization" : `Bearer ${localStorage.getItem("token")}`
                },
                body : JSON.stringify({details})
            })

            if(res.ok)alert("cart saved successfully")
        }



</script>
</html>
